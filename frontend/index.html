<html lang="es">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" type="image/png" href="img/logo/Logo Lumina - Sin texto.png">
    <title>Lumina - Inicio</title>

    <link rel="preload" href="css/normalize.css" as="style">
    <link rel="stylesheet" href="css/normalize.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Libre+Baskerville:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">  
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=search" />
    
    <link rel="preload" href="css/styles.css" as="style">
    <link rel="stylesheet" href="css/styles.css">

</head>
<body>
    <!-- Menú de Navegación -->
    <header>
        <div class="nav-bg">

            <!-- Logo -->
            <div class="logo">
                <a href="index.html">
                  <img src="img/logo/Logo Lumina (Fondo Blanco) Horizontal - Sin eslogan.png" alt="Logo de la universidad">
                </a>
            </div>
            
            <!-- Barra de búsqueda -->
            <div class="search-container">
                <span class="search-icon material-symbols-outlined">search</span>
                <input class="search" type="search" placeholder="Buscar...">
            </div>

            <nav class="nav-principal">
                <a href="index.html">Inicio</a>
                <a href="login.html">Iniciar Sesión</a>
            </nav>

        </div>
    </header>
    
    <!-- Heading --> 
    <section class="uni">
        <section class="contenido-uni">
            <div class="ubicacion">
                <h2>Bienvenido a<br>Lumina: <br><span>Claridad a la información académica.</span></h2>
                <p>Plataforma de publicación digital para<br>instituciones académicas.</p>
            </div> 
        </section>
    </section>
    
    <!-- Contenido Principal -->
    <main>
        <section class="ultimas-publi">

        </section>

        <section class="material-clases">

        </section>

        <section class="salon-fama">

        </section>

    </main>

</body>

<footer class="footer">
    <section class="contenido-footer">
        <h1>Lumina</h1>
        <p>Plataforma de difusión digital académica</p>
    </section>
    <p class="copy">© 2026 Lumina: Claridad a la información</p>
</footer>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const nav = document.querySelector('.nav-principal'); // Seleccionamos tu nav actual
    const estaLogueado = localStorage.getItem('sesion_activa');

    if (estaLogueado === 'true') {
        // Si el usuario ya entró, mostramos todo
        nav.innerHTML = `
            <a href="index.html">Inicio</a>
            <a href="avisos.html">Avisos</a>
            <a href="recursos.html">Recursos</a>
            <a href="cuenta.html">Cuenta</a>
        `;

        // Lógica para el botón de salir
        document.getElementById('btn-salir').addEventListener('click', (e) => {
            e.preventDefault();
            localStorage.removeItem('sesion_activa');
            window.location.reload(); // Recarga para volver al menú de invitado
        });
    } else {
        // Si es un invitado, solo ve Inicio e Iniciar Sesión
        nav.innerHTML = `
            <a href="index.html">Inicio</a>
            <a href="login.html">Iniciar Sesión</a>
        `;
    }
});
</script>
</html>
