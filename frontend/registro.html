<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <link rel="icon" type="image/png" href="img/logo/LogoPrincipal(fondo negro).png">
    <title>UAT Online</title>

    <link rel="preload" href="css/normalize.css" as="style">
    <link rel="stylesheet" href="css/nomalize.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Libre+Baskerville:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">  
    <link rel="preload" href="css/styles.css" as="style">
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body>
    <header>
        <div class="nav-bg">

            <div class="logo">
                <img src="img/logo/LogoPrincipalTexto(fondo blanco).png" alt="Logo de la empresa">
                <p>UAT Online</p>
            </div>
            
            <nav class="nav-principal">
                <a href="index.html">Inicio</a>
            </nav>

        </div>
    </header>

    <div class="flex items-center justify-center min-h-screen bg-gray-100">
      <div class="relative flex flex-col m-6 space-y-8 bg-white shadow-2xl rounded-2xl md:flex-row md:space-y-0">

        <div class="flex flex-col justify-center p-8 md:p-14">
          <span class="mb-3 text-4xl font-bold">Registrarse</span>
          <span class="font-light text-gray-400 mb-8"> Bienvenido! Por favor ingresa tus datos</span>

          
          <form action="../backend/conexion_bd.php" method="POST">

            <div class="py-4">
              <span class="mb-2 text-md">Nombre</span>
              
              <input type="text" name="nombre" id="name"
              class="w-full p-2 border border-gray-300 rounded-md placeholder:font-light placeholder:text-gray-500"/>
            </div>

            <div class="py-4">
              <span class="mb-2 text-md">Nombre de usuario</span>
              
              <input type="text" name="usuario" id="username"
              class="w-full p-2 border border-gray-300 rounded-md placeholder:font-light placeholder:text-gray-500"/>
            </div>

            <div class="py-4">
              <span class="mb-2 text-md">Correo</span>
              
              <input type="text" name="correo" id="email"
              class="w-full p-2 border border-gray-300 rounded-md placeholder:font-light placeholder:text-gray-500"/>
            </div>

            <div class="py-4">
              <span class="mb-2 text-md">Contraseña</span>
              
              <input type="password" name="password" id="pass"
              class="w-full p-2 border border-gray-300 rounded-md placeholder:font-light placeholder:text-gray-500"/>
            </div>

            <div class="flex justify-between w-full py-4">
              <div class="mr-24">
                <input type="checkbox" name="ch" id="ch" class="mr-2" />
                <span class="text-md">Recordar contraseña</span>
              </div>
            </div>

            
            <button type="submit"
            class="w-full bg-black text-white p-2 rounded-lg mb-6 hover:bg-white hover:text-black hover:border hover:border-gray-300">
              Registrar
            </button>

          </form>

          <div class="text-center text-gray-400">
            <span class="font-bold text-black"></span>
          </div>

        </div>

        <div class="relative">
          <img src="img/logo/LogoPrincipal(fondo blanco).png"
          class="w-[300px] h-auto hidden rounded-r-2xl md:block object-contain mt-60 mr-10"/>
        </div>

      </div>
    </div>
  </body>
</html>
