<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" type="image/png" href="img/logo/LogoPrincipal(fondo negro).png">
    <title>UAT Online - Cuenta</title>

    <link rel="preload" href="css/normalize.css" as="style">
    <link rel="stylesheet" href="css/normalize.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Libre+Baskerville:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">  
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=search" />
    
    <link rel="preload" href="css/styles.css" as="style">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- Menú de Navegación -->
    <header>
        <div class="nav-bg">

            <!-- Logo -->
            <div class="logo">
                <a href="index.html">
                  <img src="img/logo/LogoPrincipalTexto(fondo blanco).png" alt="Logo de la universidad">
                </a>
                <p>UAT Online</p>
            </div>
            
            <!-- Barra de búsqueda -->
            <div class="search-container">
                <span class="search-icon material-symbols-outlined">search</span>
                <input class="search" type="search" placeholder="Buscar...">
            </div>

            <nav class="nav-principal">
                <a href="index.html">Inicio</a>
                <a href="avisos.html">Avisos</a>
                <a href="recursos.html">Recursos</a>
                <a href="cuenta.html" class="btn-cuenta-estilo">Cuenta</a>
            </nav>

        </div>
    </header>

    <main>
        <div class="logout-container">
            <button id="btn-cerrar-cuenta" class="btn-salir-estilo">
                Cerrar Sesión
            </button>
        </div>
    </main>
</body>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const btnCerrar = document.getElementById('btn-cerrar-cuenta');

    if (btnCerrar) {
        btnCerrar.addEventListener('click', (e) => {
            e.preventDefault();
            
            // 1. Borramos la sesión del navegador
            localStorage.removeItem('sesion_activa');
            
            // 2. Redirigimos al inicio
            window.location.href = 'index.html';
        });
    }

    // OPCIONAL: Si alguien intenta entrar a cuenta.html sin estar logueado, lo regresamos
    const estaLogueado = localStorage.getItem('sesion_activa');
    if (estaLogueado !== 'true') {
        window.location.href = 'login.html';
    }
});
</script>

</html>
